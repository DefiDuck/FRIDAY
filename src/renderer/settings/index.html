<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="Content-Security-Policy"
          content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self';" />
    <link rel="stylesheet" href="../shared/base.css" />
    <title>F.R.I.D.A.Y. — Settings</title>
    <style>
      /* Window-specific layout for the existing pre-P4b settings stub.
         The full tabbed-modal redesign lands in P4b; this pass just
         migrates the existing fields onto the shared design tokens so
         the stub feels like the same app as the rest of v0.1.3.
         Tokens come from shared/tokens.css. */

      html, body {
        height: 100%; width: 100%; overflow: hidden;
        user-select: none;
      }

      .frame { display: flex; flex-direction: column; height: 100%; }

      /* ── Titlebar ─────────────────────────────────────────────────── */
      .titlebar {
        -webkit-app-region: drag;
        display: flex; align-items: center; justify-content: space-between;
        padding: var(--space-2) var(--space-3);
        font-size: 11px; letter-spacing: .8px; text-transform: uppercase;
        color: var(--text-secondary);
        border-bottom: 1px solid var(--border-subtle);
        background: var(--bg-elevated);
      }
      .titlebar .t {
        font-weight: 600; color: var(--text-primary);
        letter-spacing: .3px; text-transform: none;
      }
      .titlebar button {
        -webkit-app-region: no-drag;
        background: transparent; border: 0; color: var(--text-secondary);
        font-size: 14px; padding: 2px 6px; border-radius: 3px;
      }
      .titlebar button:hover {
        background: var(--bg-input); color: var(--text-primary);
      }

      /* ── Body / form ──────────────────────────────────────────────── */
      .body {
        flex: 1;
        padding: var(--space-4) 18px var(--space-1);
        overflow-y: auto;
      }
      .field { margin-bottom: var(--space-4); }
      .label {
        display: block; font-size: 11px; color: var(--text-secondary);
        margin-bottom: var(--space-1);
        text-transform: uppercase; letter-spacing: .5px;
      }
      .help {
        font-size: 11px; color: var(--text-secondary);
        margin-top: var(--space-1);
      }

      /* Inputs inherit the shared styles; we just need width control here. */
      input[type="time"],
      input[type="text"],
      input[type="number"] { width: 100%; }
      input[type="number"] { width: 84px; font-family: var(--font-mono); }

      .row2 { display: flex; gap: var(--space-4); }
      .row2 > .field { flex: 1; }

      .toggle {
        display: flex; align-items: center; gap: var(--space-2);
        cursor: pointer;
      }
      .toggle input { width: auto; margin: 0; }

      /* ── Footer (status flash + save button) ──────────────────────── */
      .footer {
        display: flex; justify-content: space-between; align-items: center;
        padding: 10px 18px var(--space-4);
        border-top: 1px solid var(--border-subtle);
      }
      .status {
        font-size: 11px; min-height: 14px;
        transition: opacity .25s;
      }
      .status.ok   { color: var(--accent-teal); }
      .status.err  { color: var(--status-error); }
      .status.fade { opacity: 0; }

      /* Compact save button (smaller than wizard CTAs). */
      button.primary { padding: 7px 16px; }

      /* Diagnostic line (next-fire timestamps). */
      .diag {
        font-family: var(--font-mono);
        font-size: 10.5px;
        color: var(--text-secondary);
        line-height: 1.5;
      }
    </style>
  </head>
  <body>
    <div class="frame">
      <div class="titlebar">
        <span class="t">Settings</span>
        <button id="close-btn" aria-label="Close (Esc)">✕</button>
      </div>
      <div class="body">
        <div class="row2">
          <div class="field">
            <label class="label" for="wake">Wake time</label>
            <input id="wake" type="time" step="60" />
            <div class="help">Morning briefing fires here.</div>
          </div>
          <div class="field">
            <label class="label" for="end">Session end</label>
            <input id="end" type="time" step="60" />
            <div class="help">Journal reminder fires here.</div>
          </div>
        </div>
        <div class="field">
          <label class="label" for="followup">Follow-up delay (min)</label>
          <input id="followup" type="number" min="0" max="240" step="5" />
          <div class="help">Re-prompt if you haven't journaled after this many minutes.</div>
        </div>
        <div class="field">
          <label class="toggle">
            <input id="startup" type="checkbox" />
            <span>Launch with Windows</span>
          </label>
        </div>
        <div class="field">
          <label class="toggle">
            <input id="briefing" type="checkbox" />
            <span>Show morning briefing on startup</span>
          </label>
        </div>
        <div class="field diag" id="diag">Next wake: — · Next session-end: —</div>
      </div>
      <div class="footer">
        <span class="status" id="status"></span>
        <button class="primary" id="save-btn">Save</button>
      </div>
    </div>
    <script type="module" src="./settings.js"></script>
  </body>
</html>
